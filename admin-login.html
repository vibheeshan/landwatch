<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - LandWatch</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <section class="container center" style="padding-top:5rem;">
    <h2>Admin Login</h2>
    <form id="admin-login-form" style="max-width:400px;margin:auto;">
      <div class="form-group"><label>Email</label><input type="email" id="admin-email" required></div>
      <div class="form-group"><label>Password</label><input type="password" id="admin-password" required></div>
      <button class="btn" type="submit">Login</button>
    </form>
  </section>
  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
